<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastry Jobs — Southwest Ohio</title>
<style>
  :root {
    --cream: #faf5ec;
    --card: #ffffff;
    --brown: #5b3a29;
    --brown-light: #8a6a52;
    --accent: #c0392b;
    --gold: #b8860b;
    --purple: #6d4c9f;
    --green: #2e7d32;
    --border: #e8ddc9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--cream);
    color: var(--brown);
    min-height: 100vh;
  }
  header {
    background: var(--brown);
    color: #fdf8ef;
    padding: 28px 24px 22px;
    text-align: center;
  }
  header h1 { font-size: 28px; letter-spacing: 0.5px; }
  header .sub { font-size: 14px; opacity: 0.85; margin-top: 6px; font-style: italic; }
  header .updated { font-size: 12px; opacity: 0.7; margin-top: 10px; font-family: Helvetica, Arial, sans-serif; }
  .filters {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    padding: 16px 24px 4px; font-family: Helvetica, Arial, sans-serif;
  }
  .filters button {
    border: 1px solid var(--brown-light); background: #fff; color: var(--brown);
    padding: 6px 14px; border-radius: 16px; font-size: 13px; cursor: pointer;
  }
  .filters button.active { background: var(--brown); color: #fff; border-color: var(--brown); }
  main { max-width: 820px; margin: 0 auto; padding: 16px 16px 40px; }
  .count { font-size: 13px; color: var(--brown-light); margin: 10px 4px 14px; font-family: Helvetica, Arial, sans-serif; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(91,58,41,0.08);
    display: flex; justify-content: space-between; gap: 14px; align-items: center;
  }
  .card.venue { border-left: 5px solid var(--gold); }
  .info { flex: 1; min-width: 0; }
  .title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .title { font-size: 17px; font-weight: bold; }
  .badge {
    font-family: Helvetica, Arial, sans-serif; font-size: 10px; font-weight: bold;
    padding: 2px 8px; border-radius: 10px; letter-spacing: 0.5px; white-space: nowrap;
  }
  .badge.new { background: var(--green); color: #fff; }
  .badge.sports { background: var(--gold); color: #fff; }
  .badge.event { background: var(--purple); color: #fff; }
  .company { font-size: 14px; margin-top: 3px; }
  .meta {
    font-family: Helvetica, Arial, sans-serif; font-size: 12px; color: var(--brown-light);
    margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap;
  }
  .notes { font-size: 12.5px; font-style: italic; color: var(--brown-light); margin-top: 5px; }
  .apply {
    font-family: Helvetica, Arial, sans-serif; font-size: 13px; font-weight: bold;
    background: var(--accent); color: #fff; text-decoration: none;
    padding: 8px 16px; border-radius: 6px; white-space: nowrap; flex-shrink: 0;
  }
  .apply:hover { background: #a93226; }
  .empty { text-align: center; padding: 40px 0; color: var(--brown-light); font-style: italic; }
  footer {
    text-align: center; font-size: 12px; color: var(--brown-light);
    padding: 18px; font-family: Helvetica, Arial, sans-serif;
  }
  footer a { color: var(--brown-light); }
  @media (max-width: 540px) {
    .card { flex-direction: column; align-items: stretch; }
    .apply { text-align: center; }
  }
</style>
</head>
<body>
<header>
  <h1>🥐 Pastry Jobs — Southwest Ohio</h1>
  <div class="sub">Pastry chef · baker · pastry cook · sous chef — Cincinnati, Dayton &amp; Columbus</div>
  <div class="updated" id="updated"></div>
</header>

<div class="filters" id="filters">
  <button data-f="all" class="active">All</button>
  <button data-f="venue">🏟 Venues &amp; Event Spaces</button>
  <button data-f="new">New</button>
  <button data-f="cincinnati">Cincinnati</button>
  <button data-f="columbus">Columbus</button>
  <button data-f="dayton">Dayton</button>
</div>

<main>
  <div class="count" id="count"></div>
  <div id="list"></div>
</main>

<footer>
  Updated daily at 6 AM ET · Listings drop off after 30 days ·
  <a href="https://github.com/delbraeth/pastry-jobs">source</a>
</footer>

<script>
const CINCY = ['cincinnati','west chester','mason','lebanon','covington','newport','florence'];
const COLS  = ['columbus','dublin','upper arlington','new albany','westerville','hilliard','gahanna','reynoldsburg','grove city'];
const DAYT  = ['dayton','centerville','kettering','washington township','xenia','wilberforce','beavercreek','springboro','miamisburg'];

let jobs = [];
let filter = 'all';
let lastUpdated = '';

function region(loc) {
  const l = loc.toLowerCase();
  if (CINCY.some(c => l.includes(c))) return 'cincinnati';
  if (COLS.some(c => l.includes(c))) return 'columbus';
  if (DAYT.some(c => l.includes(c))) return 'dayton';
  return 'other';
}
function isNew(j) { return j.firstSeen === lastUpdated; }
function isVenue(j) { return j.type === 'sports' || j.type === 'event'; }

function render() {
  const list = document.getElementById('list');
  let shown = jobs.filter(j => {
    if (filter === 'all') return true;
    if (filter === 'venue') return isVenue(j);
    if (filter === 'new') return isNew(j);
    return region(j.location) === filter;
  });
  // venues first, then newest first
  shown.sort((a, b) => (isVenue(b) - isVenue(a)) || (new Date(b.firstSeen) - new Date(a.firstSeen)) || a.company.localeCompare(b.company));

  document.getElementById('count').textContent =
    shown.length + ' listing' + (shown.length === 1 ? '' : 's') +
    (filter !== 'all' ? ' (filtered)' : '');

  if (!shown.length) {
    list.innerHTML = '<div class="empty">No listings match this filter right now — check back tomorrow.</div>';
    return;
  }
  list.innerHTML = shown.map(j => `
    <div class="card${isVenue(j) ? ' venue' : ''}">
      <div class="info">
        <div class="title-row">
          <span class="title">${j.title}</span>
          ${isNew(j) ? '<span class="badge new">NEW</span>' : ''}
          ${j.type === 'sports' ? '<span class="badge sports">SPORTS VENUE</span>' : ''}
          ${j.type === 'event' ? '<span class="badge event">EVENT SPACE</span>' : ''}
        </div>
        <div class="company">${j.company} — ${j.location}</div>
        <div class="meta">
          ${j.pay ? '<span>💰 ' + j.pay + '</span>' : ''}
          ${j.schedule ? '<span>🕐 ' + j.schedule + '</span>' : ''}
          <span>📋 ${j.source}</span>
          <span>found ${j.firstSeen}</span>
        </div>
        ${j.notes ? '<div class="notes">' + j.notes + '</div>' : ''}
      </div>
      <a class="apply" href="${j.url}" target="_blank" rel="noopener">View / Apply</a>
    </div>`).join('');
}

document.getElementById('filters').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  filter = e.target.dataset.f;
  document.querySelectorAll('.filters button').forEach(b => b.classList.toggle('active', b === e.target));
  render();
});

fetch('jobs.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    jobs = data.jobs;
    lastUpdated = data.updated;
    document.getElementById('updated').textContent = 'Last updated: ' + data.updated;
    render();
  })
  .catch(() => {
    document.getElementById('list').innerHTML = '<div class="empty">Could not load job data.</div>';
  });
</script>
</body>
</html>
